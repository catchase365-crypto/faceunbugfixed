<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能人脸 XR 扫描仪 (实体贴图终极版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; }
        #container { position: relative; width: 100vw; height: 55vh; background: #111; overflow: hidden; margin-bottom: 15px;}
        video { display: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        
        .dashboard { width: 90%; max-width: 400px; background: #1a1a1a; border-radius: 20px; padding: 20px; box-sizing: border-box; text-align: center; }
        h2 { margin: 0 0 15px 0; font-size: 20px; color: #fff; }
        #instruction { font-size: 22px; font-weight: bold; color: #ffeb3b; margin-bottom: 20px; height: 30px; }
        
        .task-list { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .task { display: flex; flex-direction: column; align-items: center; opacity: 0.4; transition: 0.3s; }
        .task.active { opacity: 1; transform: scale(1.1); }
        .task.done { opacity: 1; color: #00ff00; }
        .icon { font-size: 30px; margin-bottom: 5px; }
        
        button { width: 100%; padding: 15px; font-size: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #start_btn { background: #007bff; color: white; }
        #start_btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #view_btn { background: #00ff00; color: #000; display: none; }
    </style>
</head>
<body>

    <div id="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="dashboard">
        <h2 id="status">正在初始化神经网络...</h2>
        
        <div id="scan_ui" style="display: none;">
            <div id="instruction">请将正脸对准屏幕</div>
            <div class="task-list">
                <div class="task" id="task_front"><div class="icon">👤</div><span>正脸</span></div>
                <div class="task" id="task_left"><div class="icon">👈</div><span>左转</span></div>
                <div class="task" id="task_right"><div class="icon">👉</div><span>右转</span></div>
                <div class="task" id="task_up"><div class="icon">👆</div><span>仰头</span></div>
                <div class="task" id="task_down"><div class="icon">👇</div><span>低头</span></div>
                <div class="task" id="task_blink"><div class="icon">👁️</div><span>眨眼</span></div>
                <div class="task" id="task_mouth"><div class="icon">😮</div><span>张嘴</span></div>
            </div>
        </div>

        <button id="start_btn" disabled>等待摄像头...</button>
        <button id="view_btn">✅ 建模完成，查看实体模型</button>
    </div>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('start_btn');
        const viewBtn = document.getElementById('view_btn');
        const scanUi = document.getElementById('scan_ui');
        const instruction = document.getElementById('instruction');

        let isReady = false;
        let scanPhase = 'idle'; 
        
        // 存储扫描数据的变量
        let bestFaceData = null;
        let bestFaceTexture = null;
        let sideTextures = { left: null, right: null, up: null, down: null };
        let cameraAspect = 1.0; 

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        function detectHeadPose(landmarks) {
            const nose = landmarks[1];
            const leftCheek = landmarks[234]; 
            const rightCheek = landmarks[454]; 
            const top = landmarks[10];
            const bottom = landmarks[152];

            const distLeft = Math.abs(nose.x - leftCheek.x);
            const distRight = Math.abs(nose.x - rightCheek.x);
            const hRatio = distLeft / (distRight + 0.00001);
            
            const vTotal = Math.abs(bottom.y - top.y);
            const vNose = Math.abs(nose.y - top.y);
            const vRatio = vNose / vTotal;

            if (vRatio < 0.35) return 'up';
            if (vRatio > 0.65) return 'down';
            if (hRatio < 0.4) return 'right'; 
            if (hRatio > 2.5) return 'left';  
            if (hRatio > 0.8 && hRatio < 1.2) return 'front';
            return 'unknown';
        }

        function detectLiveness(landmarks) {
            const eyeTop = landmarks[159].y, eyeBot = landmarks[145].y;
            const mouthTop = landmarks[13].y, mouthBot = landmarks[14].y;
            return {
                isBlinking: Math.abs(eyeTop - eyeBot) < 0.012,
                isMouthOpen: Math.abs(mouthTop - mouthBot) > 0.04
            };
        }

        function setTaskStatus(taskId, status) {
            const el = document.getElementById(taskId);
            if(!el) return;
            if(status === 'active') { el.className = 'task active'; }
            if(status === 'done') { 
                el.className = 'task done'; 
                const icon = el.querySelector('.icon');
                if (taskId === 'task_blink') icon.innerText = '😉';
                else if (taskId === 'task_mouth') icon.innerText = '😲';
                else icon.innerText = '✅';
            }
        }

        function captureFrame(results, w, h) {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = w; offCanvas.height = h;
            const offCtx = offCanvas.getContext('2d');
            offCtx.translate(w, 0); offCtx.scale(-1, 1);
            offCtx.drawImage(results.image, 0, 0, w, h);
            return offCanvas.toDataURL('image/jpeg', 1.0); // 提高到最高画质
        }

        faceMesh.onResults((results) => {
            const videoW = videoElement.videoWidth;
            const videoH = videoElement.videoHeight;
            if (!videoW || !videoH) return; 

            cameraAspect = videoH / videoW;

            canvasElement.width = videoW;
            canvasElement.height = videoH;
            
            canvasCtx.save();
            canvasCtx.translate(videoW, 0); 
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(results.image, 0, 0, videoW, videoH);
            
            canvasCtx.fillStyle = "rgba(0, 0, 0, 0.8)";
            canvasCtx.fillRect(0, 0, videoW, videoH);
            canvasCtx.setTransform(1, 0, 0, 1, 0, 0);
            
            if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                if (!isReady) {
                    isReady = true;
                    statusText.innerText = "面部锁定成功";
                    startBtn.innerText = "开始 3D 面容识别";
                    startBtn.disabled = false;
                }

                const face = results.multiFaceLandmarks[0];
                const pose = detectHeadPose(face);

                for (const landmark of face) {
                    const x = (1 - landmark.x) * videoW;
                    const y = landmark.y * videoH;
                    canvasCtx.fillStyle = scanPhase !== 'idle' && scanPhase !== 'done' ? "#00ff00" : "#777";
                    canvasCtx.fillRect(x, y, 2, 2);
                }

                const liveness = detectLiveness(face);

                if (scanPhase === 'front' && pose === 'front') {
                    bestFaceData = face.map(pt => ({ x: pt.x, y: pt.y, z: pt.z }));
                    bestFaceTexture = captureFrame(results, videoW, videoH);
                    setTaskStatus('task_front', 'done');
                    instruction.innerText = "请向左缓慢转头";
                    scanPhase = 'left';
                    setTaskStatus('task_left', 'active');
                } else if (scanPhase === 'left' && pose === 'left') {
                    sideTextures.left = captureFrame(results, videoW, videoH);
                    setTaskStatus('task_left', 'done');
                    instruction.innerText = "请向右缓慢转头";
                    scanPhase = 'right';
                    setTaskStatus('task_right', 'active');
                } else if (scanPhase === 'right' && pose === 'right') {
                    sideTextures.right = captureFrame(results, videoW, videoH);
                    setTaskStatus('task_right', 'done');
                    instruction.innerText = "请向上抬头";
                    scanPhase = 'up';
                    setTaskStatus('task_up', 'active');
                } else if (scanPhase === 'up' && pose === 'up') {
                    sideTextures.up = captureFrame(results, videoW, videoH);
                    setTaskStatus('task_up', 'done');
                    instruction.innerText = "请向下低头";
                    scanPhase = 'down';
                    setTaskStatus('task_down', 'active');
                } else if (scanPhase === 'down' && pose === 'down') {
                    sideTextures.down = captureFrame(results, videoW, videoH);
                    setTaskStatus('task_down', 'done');
                    instruction.innerText = "请快速眨眼";
                    scanPhase = 'blink';
                    setTaskStatus('task_blink', 'active');
                } else if (scanPhase === 'blink' && liveness.isBlinking) {
                    setTaskStatus('task_blink', 'done');
                    instruction.innerText = "请张开嘴巴";
                    scanPhase = 'mouth';
                    setTaskStatus('task_mouth', 'active');
                } else if (scanPhase === 'mouth' && liveness.isMouthOpen) {
                    setTaskStatus('task_mouth', 'done');
                    instruction.innerText = "真身校验成功！";
                    instruction.style.color = "#00ff00";
                    scanPhase = 'done';
                    setTimeout(() => {
                        startBtn.style.display = 'none';
                        viewBtn.style.display = 'block';
                    }, 500);
                }
            } else {
                if (scanPhase !== 'idle' && scanPhase !== 'done') {
                    instruction.innerText = "⚠️ 丢失人脸，请回到画面中";
                    instruction.style.color = "#ff4444";
                }
            }
            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();

        startBtn.onclick = () => {
            startBtn.style.display = 'none';
            statusText.style.display = 'none';
            scanUi.style.display = 'block';
            scanPhase = 'front';
            instruction.innerText = "请注视屏幕正中央";
            instruction.style.color = "#ffeb3b";
            setTaskStatus('task_front', 'active');
        };

        viewBtn.onclick = () => {
            if (!bestFaceData || !bestFaceTexture) return alert("数据生成失败");
            
            // 使用 sessionStorage 传递庞大的数据，避免代码超载
            sessionStorage.setItem('faceData', JSON.stringify(bestFaceData));
            sessionStorage.setItem('faceTexture', bestFaceTexture);
            sessionStorage.setItem('sideTextures', JSON.stringify(sideTextures));
            sessionStorage.setItem('cameraAspect', cameraAspect.toString());
            
            const newWindow = window.open('', '_blank');
            newWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>带皮肤贴图的实体 3D 模型</title>
                    <style>
                        body { margin: 0; background: #050505; overflow: hidden; color: #fff; font-family: sans-serif; }
                        .ui-panel { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: none; }
                        .btn-group { display: inline-flex; background: rgba(255,255,255,0.1); padding: 5px; border-radius: 30px; backdrop-filter: blur(10px); pointer-events: auto; }
                        .mode-btn { background: transparent; border: none; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 14px; transition: 0.3s; }
                        .mode-btn.active { background: #007bff; font-weight: bold; }
                    </style>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script>
                    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"><\/script>
                    <script src="https://cdn.jsdelivr.net/npm/delaunator@5.0.0/delaunator.min.js"><\/script>
                </head>
                <body>
                    <div class="ui-panel">
                        <div class="btn-group">
                            <button class="mode-btn" id="btn_points">点云模式</button>
                            <button class="mode-btn active" id="btn_solid">实体贴图模式</button>
                            <button class="mode-btn" id="btn_wire">骨骼线框</button>
                        </div>
                    </div>
                    <script>
                        const data = JSON.parse(sessionStorage.getItem('faceData'));
                        const textureBase64 = sessionStorage.getItem('faceTexture');
                        const aspectMultiplier = parseFloat(sessionStorage.getItem('cameraAspect'));
                        
                        const scene = new THREE.Scene();
                        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                        const renderer = new THREE.WebGLRenderer({ antialias: true });
                        renderer.setSize(window.innerWidth, window.innerHeight);
                        document.body.appendChild(renderer.domElement);

                        const controls = new THREE.OrbitControls(camera, renderer.domElement);
                        controls.enableDamping = true;

                        // 准备 3D 几何体和算法点位
                        const geometry = new THREE.BufferGeometry();
                        const positions = new Float32Array(data.length * 3);
                        const uvs = new Float32Array(data.length * 2);
                        const points2D = [];

                        data.forEach((v, i) => {
                            // 设置 3D 坐标
                            positions[i*3] = (0.5 - v.x) * 3;
                            positions[i*3+1] = (0.5 - v.y) * 3 * aspectMultiplier;
                            positions[i*3+2] = -v.z * 3;
                            
                            // 设置 UV 贴图坐标 (告诉贴图怎么覆盖在这个点上)
                            uvs[i*2] = 1 - v.x;
                            uvs[i*2+1] = 1 - v.y;
                            
                            // 收集 2D 坐标给三角剖分算法使用
                            points2D.push([v.x, v.y]);
                        });

                        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                        geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

                        // 【核心科技】：使用 Delaunator 将离散的点连成实体的三角形网格！
                        const delaunay = Delaunator.from(points2D);
                        geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(delaunay.triangles), 1));
                        geometry.computeVertexNormals();

                        // 加载刚刚偷偷拍下的高清原皮作为贴图
                        const textureLoader = new THREE.TextureLoader();
                        const faceTexture = textureLoader.load(textureBase64);

                        // 创建三种不同的材质
                        const matSolid = new THREE.MeshBasicMaterial({ map: faceTexture, side: THREE.DoubleSide });
                        const matWire = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.2 });
                        const matPoints = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.015 });

                        // 生成三种 3D 对象
                        const meshSolid = new THREE.Mesh(geometry, matSolid);
                        const meshWire = new THREE.Mesh(geometry, matWire);
                        const pointsObj = new THREE.Points(geometry, matPoints);

                        // 默认显示实体贴图
                        scene.add(meshSolid);
                        camera.position.z = 1.5;

                        // UI 交互逻辑
                        document.getElementById('btn_points').onclick = (e) => switchMode(e.target, pointsObj);
                        document.getElementById('btn_solid').onclick = (e) => switchMode(e.target, meshSolid);
                        document.getElementById('btn_wire').onclick = (e) => switchMode(e.target, meshWire);

                        function switchMode(btn, targetObj) {
                            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            
                            scene.remove(meshSolid);
                            scene.remove(meshWire);
                            scene.remove(pointsObj);
                            
                            scene.add(targetObj);
                        }

                        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
                        animate();

                        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
                    <\/script>
                </body>
                </html>
            `);
            newWindow.document.close();
        };
    </script>
</body>
</html>
